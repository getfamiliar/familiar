# Familiar — sample config.
# Copy this file to config/config.yml (gitignored) and fill in the
# real values. The platform reads it at daemon boot via the linter
# (`./cli.sh config lint`) and at runtime via the host ConfigService.

core:
  # Password for the bus-state postgres (`familiar-postgres`). Used by the
  # host daemon to start the container, by the agent container (passed
  # in via -e), and by host-side CLIs (event, etc.). Database name and
  # user are hardcoded as `familiar`.
  postgresPassword: familiar

  # Chat channel the user prefers to be contacted on. Set to a
  # messenger plugin like "whatsapp" or "telegram" once you've set up
  # such an integration. Defaults to "cli" so you can chat from the
  # terminal without any plugin configured.
  defaultChatChannel: cli

  # Number of rolled-over log files kept beyond the active one.
  # Optional; falls back to 7 when omitted.
  logRetentionDays: 7

  # Hard cap (seconds) on a *single SDK step* of `agent.generate()`.
  # The timer resets on every completed step (and pauses while the
  # runner is parked on `call_handler`/`waitForSubagent`), so this
  # bounds the slowest single step — catching a wedged tool call or
  # stuck model — without penalising long-but-healthy runs of many
  # short steps. The Scheduler aborts the runner's signal with an
  # `AgentRunTimeoutError` when the budget expires, settling the
  # agentrun `failed` with a clear `agentrun step timed out` message.
  # Optional; falls back to 150 when omitted.
  # agentStepTimeout: 150

  # Controls whether — and how — each agentrun's resolved system
  # prompt is persisted into agentruns.system_prompt. The report
  # layer surfaces it in the Agentrun Start section when the
  # consumer opts into `--details`. Off by default — turn on while
  # debugging a handler, off again after. Accepted values:
  #   false        — don't stamp the prompt (default).
  #   true / "full" — stamp it verbatim.
  #   "non-static" — stamp it with SOUL.md / CONTEXT.md replaced by
  #                  `<content of file …>` placeholders, keeping the 
  #                  per-run signal (handler body, tool list, event-context blocks,
  #                  runtime block) without the framing-file bulk.
  # logSystemPrompt: false

  # User's preferred IANA timezone — used by every plugin / tool
  # that turns clock-walltime into ISO timestamps. Falls back to the
  # host system timezone when unset.
  # timezone: Europe/Berlin

  # Default calendar the agent writes new events into when
  # cal_create_event is invoked without an explicit calendar_id.
  # Accepts a calendar name ("Calendar") or a qualified form
  # ("ms365:Calendar") when two providers share a calendar name.
  # If unset, defaults to the first default calendar the system finds.
  # defaultCalendar: Calendar

  # Workspace-relative paths the assistant treats as its own curated
  # memory. A glob string or a list of glob strings (`*`-glob grammar
  # anchored at the workspace root, e.g. `wiki/**`). These paths are BOTH (a) writable by
  # non-privileged agentruns — the normal `.md` / `toolgroups/` privilege
  # gate is bypassed for them, so handlers like `memory_save` can write
  # them regardless of trust level — AND (b) quoted in full by the memory
  # plugin (matches outside the list demote to a "See also" mention).
  # Falls back to ["wiki/**"] when unset.
  # writablePaths: ["wiki/**"]

inference:
  # Provider key used when a handler does not put a provider prefix on
  # its `model` frontmatter field. Must match an entry under `apiKeys`.
  defaultProvider: featherless

  # Default model used when a handler omits `model` from its
  # frontmatter. Resolved under `defaultProvider`. Handlers can
  # override per-file with bare ids (`zai-org/GLM-5.1` → default
  # provider) or prefix-qualified ids (`openai/gpt-4o-mini`,
  # `anthropic/claude-opus-4-7`, `featherless/zai-org/GLM-5.1`).
  defaultModel: zai-org/GLM-5.1

  # Maximum number of retry attempts on retryable inference errors
  # (`APICallError.isRetryable === true` — typically 408/429/5xx,
  # including Featherless's 503 "Model is over capacity"). Retries
  # don't block the agentrun watcher: the row is set back to
  # `pending` with a future `not_before`, freeing the slot for other
  # agentruns until the retry window opens. Default 3 when omitted.
  # Per-handler override available via `maxRetries` in YAML
  # frontmatter (set to 0 there to disable retries for one handler
  # without changing the global default).
  # maxRetries: 3

  # Fraction (0–1) of a model's context window used as the per-step
  # output-token ceiling, applied ONLY when the model's metadata
  # declares no explicit output limit. A declared `outputLimit` always
  # wins and is used verbatim. There is no token counter, so this is a
  # coarse proxy for "context minus prompt" — the remainder is left as
  # headroom for the prompt. No absolute backstop: a large-context
  # model gets a correspondingly large budget. A handler can still cap
  # itself below the derived ceiling via `maxOutputTokens` in its YAML
  # frontmatter. Default 0.70 when omitted. Guarded: a value above 1
  # (e.g. `70` instead of `0.70`) is clamped to 1, and a non-positive
  # value falls back to 0.70.
  # outputFallbackPercentage: 0.70

  # API keys, one entry per provider you want to use. The map KEY is
  # the provider key — it must match a provider id in the models.dev
  # catalogue (https://models.dev/api.json), e.g. openai, anthropic,
  # google, xai, groq, deepseek, mistral — OR a provider key declared
  # by an installed plugin (e.g. `featherless`, provided by the
  # featherless plugin). The key is also the URL segment the bastion
  # mounts at /llm/<key>/ and the prefix handlers use on the `model`
  # field. Each provider's npm package + upstream endpoint come from
  # model metadata.
  # (Note: use `xai`, not `grok` — that's the models.dev provider id.)
  # `./cli.sh config lint` rejects keys that don't resolve to a known
  # provider.
  apiKeys:
    # openai: REPLACE_ME              # also read by transcribe-whisper
    # anthropic: REPLACE_ME
    # google: REPLACE_ME
    # xai: REPLACE_ME                 # xAI Grok
    # groq: REPLACE_ME
    # deepseek: REPLACE_ME
    # mistral: REPLACE_ME
    # featherless: REPLACE_ME

  # When true, raw HTTP request/response bodies for every
  # `/llm/<provider>/*` call are written to `data/llm-debug/`
  # alongside a small header (status, sanitized request headers).
  # Off by default; turn on temporarily to debug tool-call parsing
  # or other model-behavior issues, then turn off again. The
  # auth headers (`Authorization`, `x-api-key`, `x-goog-api-key`)
  # are redacted in the dumps.
  # captureModelHttpRequestBodies: false

  # When true, every step's full SDK result object is JSON-encoded
  # into stepresults.raw_result for diagnosis (Anthropic cache
  # stats, OpenAI logprobs, etc.). Off by default — the dedicated
  # token-detail columns (input_tokens_*, output_tokens_*) cover
  # the common case. Restart the daemon after changing.
  # captureRawStepResultToDatabase: false

# Chat history compaction. The ChatCompactor watches the chatmessages
# table; once its total size crosses `thresholdBytes`, it composes a
# transcript of the oldest messages (everything beyond the most-recent
# `keepUncompactedBytes` worth) and runs the `chat/compaction/index.md`
# handler to summarize them. The summary replaces those messages as a
# single user-role row. If the handler file is missing the compactor
# falls back to plain truncation (oldest rows deleted) and logs a warning.
# chat:
#   compaction:
#     thresholdBytes: 60000          # start compaction when chatmessages total exceeds this
#     keepUncompactedBytes: 30000    # keep this much of recent history verbatim

# --- Plugin-owned subtrees below. Each plugin parses + validates its
# --- own keys; the platform linter does not police them.

# Memory plugin. Indexes every .md file under data/workspace/ with an
# Orama hybrid (vector + BM25) index and surfaces relevant snippets in
# the system prompt. `embeddings.provider` + `embeddings.model` are
# required; everything else has a default. The provider id references
# an entry already declared under `inference.apiKeys.<id>` — credentials
# are not restated here. Only providers whose SDK ships embeddings work
# (openai, google, mistral, or an openai-compatible gateway).
# memory:
#   embeddings:
#     provider: openai                  # must match an enabled inference provider
#     model: text-embedding-3-small     # embedding model id under the provider
#   minScoreToMention: 0.55             # score floor for the injected `# Memories` table; files at/below are dropped
#   minVectorSimilarity: 0.3            # cosine-similarity floor for vector hits
#   maxSystemPromptMemoryResults: 8     # max files listed in the injected `# Memories` table per agentrun
#   maxToolMemoryResults: 5             # default `limit` for the memory_search tool when the agent omits it
#   excludeGlobs: []                    # carve-outs from indexing (`*`-glob, rooted at workspace root)
#   # In the injected `# Memories` table, core.writablePaths above selects each
#   # file's description source: writable-path files are described by their first
#   # paragraph, other files by their `description:` frontmatter. No separate key.
#   language: english                   # stemmer + stopwords language; unknown values fall back to english
#   hybridWeights:
#     vector: 0.5                       # weight of vector similarity in the hybrid score
#     text: 0.5                         # weight of BM25 lexical match in the hybrid score
#   persistToDiskDelay: 30              # seconds of index idleness before the dirty .msp gets flushed

# Telegram plugin. botToken comes from BotFather (/newbot). Leave the
# user id null on first boot — the bot enters discovery mode and
# replies with the numeric id of any sender, which you paste back
# here and restart.
# telegram:
#   botToken: ""
#   authorizedUserId: null

# WhatsApp plugin group allowlist. Empty / omitted means every group
# the linked account is in is observed. Each entry is matched against
# the message's remoteJid via endsWith, so users can write either the
# full JID or just the numeric id.
# whatsapp:
#   groupAllowlist:
#     - "1203....@g.us"

# Core mail safety (cross-provider). Applied by the core `mail_send_*`
# tools before dispatching to whichever plugin owns the message id.
# mail:
#   allowSend: false         # false = every send becomes a draft (across every provider)
#   recipientWhitelist: []   # when allowSend=true: each entry is either a full address or `@domain`

# Core calendar safety (cross-provider). Applied by the core `cal_*`
# write tools before dispatching to the registered provider.
# calendar:
#   allowAttendees: false    # when false, attendees passed to cal_create_event are silently dropped

# Microsoft 365 plugin (mail + calendar). All keys are optional —
# defaults are operational, so a fresh install just needs at least
# one cached login (run `./cli.sh ms365 login` to add one). See
# plugins/ms365/README.md for the full guide.
# ms365:
#   clientId: ""             # override the bundled multi-tenant app id (own-app registration)
#   tenantId: common         # override OAuth tenant — `common` accepts any work-or-school account
#   mail:
#     enabled: true          # master switch; false skips polling AND skips the ms365 mail provider
#     polling: true          # false = keep the ms365 mail provider available but stop the mailbox poller
#     mailboxes: []          # empty = every logged-in account's primary inbox
#     pollingInterval: 15    # minutes between polls
#     pollingBackoff: 1      # minutes; base of exponential backoff on poll errors
#   calendar:
#     enabled: true          # master switch; false disables polling + the ms365 cal_* provider
#     calendars: []          # empty = primary calendar only; otherwise list of calendar display names to subscribe to
#     defaultReminderMinutesBeforeStart: 15
#     pollingInterval: 15    # minutes between delta polls
#     pollingBackoff: 1      # minutes; base of exponential backoff on poll errors
#     refreshCron: "every sunday at 03:00"  # full re-walk via scan-generation tag (drops stale rows)
#     lookbackDays: 365      # delta window: how far back to surface events
#     lookaheadDays: 730     # delta window: how far ahead to surface events
