# Effective Assistant — MCP servers.
#
# Copy this file to config/mcp.yml (gitignored) and add the MCPs you
# want to run. The host-side bastion brings stdio MCPs up on demand
# as docker children when the agent calls them; container names
# follow the `ea-mcp-<id>` pattern. After `idleTimeoutSeconds`
# (default 1800 s) of inactivity the child is reaped; the next
# request cold-spawns it again.
#
# This file is OPTIONAL — when missing, the daemon simply runs no
# MCPs. Run `./cli.sh mcp lint` to validate after editing.
#
# Each top-level key is an MCP id. Ids must be lowercase alphanumeric
# (with dashes), starting with an alphanumeric.
#
# Sources implemented today: `docker-mcp-registry` (stdio), `npm`
# (stdio inside `ea-mcp-runtime-npm`), `pypi` (stdio inside
# `ea-mcp-runtime-pypi`), `external` (HTTP forward). For npm/pypi,
# package caches persist in `tmp/mcp-mount-<id>/` on the host
# (gitignored; safe to wipe).

fetch:
  title: "Fetch"
  description: "Fetches a URL from the internet and extracts its contents as markdown."
  source: docker-mcp-registry
  image: mcp/fetch
  # All fields below are optional. See docs/mcp.md for the full
  # reference. `idleTimeoutSeconds` defaults to 1800 (30 min) and
  # only affects stdio-transport (docker-mcp-registry) MCPs.
  env: []
  volumes: []
  args: []
  network:
    disable: false
    allowHosts: []
  # idleTimeoutSeconds: 1800

# Example of an env-driven MCP. Uncomment and fill in to use.
#
# github:
#   title: "GitHub"
#   description: "Read and write GitHub issues, PRs, and code search."
#   source: docker-mcp-registry
#   image: mcp/github
#   env:
#     - name: GITHUB_TOKEN
#       value: REPLACE_ME
#       is_secret: true
#       example: "ghp_..."
#       description: "Personal access token with repo + read:org scopes."

# Example of an npm-source MCP. The package's bin runs inside the
# shared `ea-mcp-runtime-npm` image (entrypoint `npx -y`); the
# `~/.npm/_npx` cache persists in `tmp/mcp-mount-weather/`.
#
# weather:
#   title: "Weather"
#   description: "Weather data via NOAA + Open-Meteo (no API key)."
#   source: npm
#   package: "@dangahagan/weather-mcp"
#   version: "1.6.1"
