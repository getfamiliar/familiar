name: release

# Every push to main publishes one lockstep version of all packages to
# npm and pushes matching version-tagged images to GHCR. The host binds
# the two channels at runtime by pulling the image tag equal to its own
# npm version, so they must ship from the same VERSION — which this single
# workflow guarantees.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run format:check --workspaces --if-present
      - run: npm run lint --workspaces --if-present
      - run: npm test --workspaces --if-present

  version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      # Monotonic, no commit-back: base 0.1 + the run number. Bump the base
      # here for a minor/major line; run_number keeps patches increasing.
      - id: compute
        run: echo "version=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  publish-npm:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      id-token: write # npm provenance via GitHub OIDC
      contents: read
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      # Vendor the init templates into host/, then stamp VERSION across all
      # packages (versions, internal-dep pins, meta bundled-plugin deps).
      - run: node scripts/sync-templates.mjs
      - run: node scripts/ci-stamp.mjs "$VERSION"
      - run: npm run build
      - name: Publish (shared → plugins → host → meta)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          npm publish -w @getfamiliar/shared --provenance --access public
          for p in cli-chat featherless memory ms365 telegram transcribe-whisper whatsapp; do
            npm publish -w "@getfamiliar/plugin-$p" --provenance --access public
          done
          npm publish -w @getfamiliar/host --provenance --access public
          npm publish -w @getfamiliar/cli --provenance --access public

  # Each image is (re)published under three tags: a content hash of its
  # build inputs (`src-<hash>`), the release `<version>`, and `latest`.
  # When the input hash already exists in the registry the image is NOT
  # rebuilt — the version and latest tags are just pointed at the existing
  # digest (a metadata-only operation). So an image is built only when its
  # own sources change; a host- or docs-only release just re-tags. Every
  # release still yields a `<version>` tag for every image, which is what
  # the host pulls (it pulls the tag equal to its own npm version).
  publish-images:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: familiar-agent
            file: container/Dockerfile
            # Rebuilt when container/ or shared/ sources change, or when the
            # baked Python set changes. Must match DEFAULT_PYTHON_PACKAGES in
            # host/src/container-runner/AgentContainer.ts — pull-mode `familiar
            # start` passes no build-arg, so the baked set is authoritative.
            hash_paths: container shared
            build_args: |
              PYTHON_PACKAGES=numpy pandas scipy sympy pillow matplotlib openpyxl python-docx pypdf python-pptx lxml beautifulsoup4 markdown pyyaml ics
          - image: familiar-bastion-bridge-img
            file: container/bridge.Dockerfile
            hash_paths: container/bridge.Dockerfile
            build_args: ""
          - image: familiar-mcp-runtime-npm
            file: mcp-runtime/npm/Dockerfile
            hash_paths: mcp-runtime/npm/Dockerfile
            build_args: ""
          - image: familiar-mcp-runtime-pypi
            file: mcp-runtime/pypi/Dockerfile
            hash_paths: mcp-runtime/pypi/Dockerfile
            build_args: ""
    env:
      VERSION: ${{ needs.version.outputs.version }}
      REGISTRY: ghcr.io/${{ github.repository_owner }}
      IMAGE: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Content hash of the image's build inputs (git tree/blob SHAs of the
      # relevant paths, plus the build args). Deterministic and
      # content-addressed, so identical inputs across releases yield the
      # same tag.
      - name: Compute content hash
        id: hash
        env:
          BUILD_ARGS: ${{ matrix.build_args }}
        run: |
          set -euo pipefail
          refs=""
          for p in ${{ matrix.hash_paths }}; do refs="$refs HEAD:$p"; done
          tree=$(git rev-parse $refs | sha256sum | cut -c1-16)
          hash=$(printf '%s|%s' "$tree" "$BUILD_ARGS" | sha256sum | cut -c1-16)
          echo "tag=src-$hash" >> "$GITHUB_OUTPUT"
      - name: Check whether this image is already built
        id: check
        run: |
          set -uo pipefail
          if docker buildx imagetools inspect "$REGISTRY/$IMAGE:${{ steps.hash.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Re-tag existing image (no rebuild)
        if: steps.check.outputs.exists == 'true'
        run: |
          set -euo pipefail
          echo "Reusing $IMAGE:${{ steps.hash.outputs.tag }} for $VERSION"
          docker buildx imagetools create \
            -t "$REGISTRY/$IMAGE:$VERSION" \
            -t "$REGISTRY/$IMAGE:latest" \
            "$REGISTRY/$IMAGE:${{ steps.hash.outputs.tag }}"
      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.hash.outputs.tag }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  release:
    needs: [version, publish-npm, publish-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ -z "$VERSION" ]; then echo "VERSION is empty — aborting release" >&2; exit 1; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --generate-notes --title "v$VERSION"
